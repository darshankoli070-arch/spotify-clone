<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utility.css">
    <title>Spotify</title>
</head>
<body>
<div class="container flex bg-black">
    <div class="left">
        <div class="close">
            <img class="invert" src="close.svg" alt="">
        </div>
        <div class="home bg-grey rounded m-1 p-1">
            <div class="logo"> <img class="invert" width="100" src="logo.svg" alt=""></div>
            <ul>
                <li><img class="invert" src="home.svg" alt="Home">Home</li>
                <li><img class="invert" src="search.svg" alt="search">Search</li>
            </ul>
        </div>
        <div class="library bg-grey rounded m-1 p-1">
            <div class="heading">
                <img class="invert" src="book.svg" alt="">
                <h2>Your library</h2>
            </div>
            <div class="songlist">
                <ul></ul>
            </div>
            <div class="footer">
                <div><a href="https://www.spotify.com/in-en/legal/"><span>Legal</span></a></div>
                <div><a href="https://www.spotify.com/in-en/safetyandprivacy/"><span>Safety &amp; Privacy Center</span></a></div>
                <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/"><span>Privacy Policy</span></a></div>
                <div><a href="https://www.spotify.com/in-en/legal/cookies-policy/"><span>Cookies</span></a></div>
                <div><a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3"><span>About Ads</span></a></div>
            </div>
        </div>
    </div>

    <div class="right bg-grey rounded">
        <div class="header">
            <div class="nav">
                <div class="hamburgerContainer">
                    <img width="30" class="invert hamburger" src="hamburger.svg" alt="">
                    <img class="invert" src="arrow-left-01-stroke-rounded.svg" alt="">
                    <img class="invert" src="arrow-right-01-stroke-rounded.svg" alt="">
                </div>
            </div>
            <div class="buttons">
                <button class="signupbtn">Sign up</button>
                <button class="loginbtn">Log in</button>
            </div>
        </div>
        <div class="spotifyPlaylists">
            <h1>Spotify Playlists</h1>
            <div class="cardContainer"></div>
        </div>

        <div class="playbar">
            <div class="seekbar">
                <div class="circle"></div>
            </div>
            <div class="abovebar">
                <div class="songinfo"></div>
                <div class="songbuttons">
                    <img class="invert" width="30" id="previous" src="previous-stroke-rounded.svg" alt="">
                    <img class="invert" width="30" id="play" src="play music.svg" alt="">
                    <img class="invert" width="30" id="next" src="next-stroke-rounded.svg" alt="">
                </div>
                <div class="timevol">
                    <div class="songtime"></div>
                    <div class="volume">
                        <img class="invert" width="25" src="volume.svg" alt="">
                        <div class="range"><input type="range" name="volume" id="" style="height: 5px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
